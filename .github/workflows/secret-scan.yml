name: "Secret scan (Gitleaks)"

# Scans for committed secrets as a belt-and-braces check on top of
# GitHub's native Secret Scanning (which catches known provider tokens).
# Gitleaks uses a broader ruleset and catches things like generic
# high-entropy strings and private keys.
#
# Docs: https://github.com/gitleaks/gitleaks

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so Gitleaks can scan past commits, not just the diff.
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
