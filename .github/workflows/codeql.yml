name: "CodeQL"

# Static analysis security scanning.
# Docs: https://docs.github.com/en/code-security/code-scanning

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    # Weekly scan every Monday 07:00 UTC catches vulnerabilities in
    # dependencies that surface after code stops changing.
    - cron: "0 7 * * 1"

# Hard-cap permissions to least privilege.
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      # Required for all workflows using CodeQL
      security-events: write
      # Required to fetch internal/private CodeQL packs
      packages: read
      # Only needed for workflows in private repositories
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [ "javascript-typescript" ]
        # If Python or other languages are added, append them here
        # e.g. [ "javascript-typescript", "python" ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
